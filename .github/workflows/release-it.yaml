name: Release-it
on: [push]
jobs:
  release-it-prerelease:
    name: Release-it prerelease
    runs-on: ubuntu-24.04
    needs: [build-docker-images]
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4.1.7
      -
        name: Release-it
        uses: "rcwbr/release-it-action/core@${{ env.GITHUB_REF_NAME }}"
